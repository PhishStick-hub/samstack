name: Publish to TestPyPI

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml
    with:
      run-build: true

  publish:
    name: Build and Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [ci]
    if: needs.ci.result == 'success'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/samstack/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build package
        run: uv build

      - name: Show version
        run: |
          VERSION=$(python -c "from samstack import __version__; print(__version__)" 2>/dev/null || \
                    python -c "import importlib.metadata; print(importlib.metadata.version('samstack'))")
          echo "Building version: $VERSION"
          echo "TestPyPI: https://test.pypi.org/project/samstack/$VERSION/"

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TEST_TOKEN }}
        run: uv publish --publish-url https://test.pypi.org/legacy/
