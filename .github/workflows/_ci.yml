name: CI Pipeline

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
      run-build:
        description: 'Whether to run the build job'
        required: false
        type: boolean
        default: false

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with ty
        run: uv run ty check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: uv run pytest tests/unit/ tests/test_settings.py tests/test_process.py tests/test_errors.py -v

  integration-tests:
    name: Integration Tests (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    needs: [quality-checks]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: core
            cmd: >-
              uv run pytest tests/ tests/integration/ -v -n 4 --timeout=300
              --ignore=tests/unit
              --ignore=tests/test_settings.py
              --ignore=tests/test_process.py
              --ignore=tests/test_errors.py
              --ignore=tests/warm
              --ignore=tests/multi_lambda
              --ignore=tests/xdist
              --ignore=tests/test_subcontainer_teardown.py
              --ignore=tests/integration/test_ryuk_crash.py
              --ignore=tests/integration/test_warm_crash.py
            continue_on_error: false
          - name: crash
            cmd: >-
              uv run pytest
              tests/test_subcontainer_teardown.py
              tests/integration/test_ryuk_crash.py
              tests/integration/test_warm_crash.py
              -v --timeout=300
            continue_on_error: false
          - name: warm
            cmd: uv run pytest tests/warm/ -v -n 2 --timeout=300
            continue_on_error: false
          - name: multi
            cmd: uv run pytest tests/multi_lambda/ -v --timeout=300
            continue_on_error: false
          - name: xdist-self
            cmd: >-
              uv run pytest tests/xdist/ -v -n 2 --timeout=300
              --ignore=tests/xdist/test_crash/
            continue_on_error: false
          - name: xdist-crash
            cmd: uv run pytest tests/xdist/test_crash/ -v --timeout=300
            continue_on_error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ${{ matrix.suite.name }} tests
        continue-on-error: ${{ matrix.suite.continue_on_error }}
        run: ${{ matrix.suite.cmd }}

  build:
    name: Build Package
    if: ${{ inputs.run-build }}
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build package
        run: uv build
