name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml
    with:
      ref: ${{ github.event.inputs.tag || github.ref }}
      run-build: true

  publish:
    name: Build and Publish to Production PyPI
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/project/samstack/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Validate version
        run: |
          VERSION=$(grep -Po 'version = "\K[^"]*' pyproject.toml)
          echo "Version in pyproject.toml: $VERSION"

          if [[ $VERSION =~ (dev|alpha|beta|rc) ]]; then
            echo "ERROR: Cannot publish pre-release version '$VERSION' to production PyPI"
            echo "Please remove dev/alpha/beta/rc suffix from version in pyproject.toml"
            exit 1
          fi

          echo "Version validated: $VERSION"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Installation

            ```bash
            pip install samstack
            ```

            Or with uv:

            ```bash
            uv add samstack
            ```

            ## Documentation

            See [README.md](https://github.com/PhishStick-hub/samstack#readme) for usage examples.
